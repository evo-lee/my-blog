name: Docker Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image-tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "tags<<EOF"
              echo "lee-blog:ci"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          image="ghcr.io/${GITHUB_REPOSITORY}"

          versions_json="$(
            gh api "/users/${owner}/packages/container/${repo}/versions?per_page=100" 2>/dev/null ||
            gh api "/orgs/${owner}/packages/container/${repo}/versions?per_page=100" 2>/dev/null ||
            echo "[]"
          )"

          latest_patch="$(
            jq -r '[.[].metadata.container.tags[]? | select(test("^0\\.0\\.[0-9]+$")) | sub("^0\\.0\\."; "") | tonumber] | max // 0' \
              <<< "$versions_json"
          )"
          version="0.0.$((latest_patch + 1))"

          {
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${image}:latest"
            echo "${image}:${version}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
