<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    
    <!-- Base SEO (will be overridden by react-helmet-async per page) -->
    <title>Lee's Blog</title>
    <meta name="description" content="Thoughts on literature, design, and the quiet spaces in between. A personal blog by Evo Lee." />
    <meta name="keywords" content="blog, literature, design, writing, personal blog, Evo Lee" />
    <meta name="author" content="Evo Lee" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#212936" />
    
    <!-- Open Graph defaults -->
    <meta property="og:site_name" content="Lee's Blog" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://cnwr4i2bpug3w.ok.kimi.link/images/hero.jpg" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@evolee" />
    <meta name="twitter:creator" content="@evolee" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://cnwr4i2bpug3w.ok.kimi.link" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
    
    <!--
      Analytics (disabled by default).
      To enable Google Analytics 4: replace G-XXXXXXXXXX with your real measurement ID and uncomment.
      To enable Umami: replace umami.example.com / YOUR_WEBSITE_ID with your instance, then uncomment.
      usePageTracking() in src/hooks is defensive — it no-ops while these scripts are absent.

      <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX', { send_page_view: false });
      </script>

      <script defer src="https://umami.example.com/script.js" data-website-id="YOUR_WEBSITE_ID" data-auto-track="false"></script>
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
